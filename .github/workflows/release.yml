name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: pwsh
        working-directory: PodcastVideoEditor

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Download FFmpeg
        run: |
          $extractPath = Join-Path $env:RUNNER_TEMP "ffmpeg"

          # Primary: BtbN GitHub releases (GitHub-to-GitHub, most reliable in Actions)
          $sources = @(
            @{
              Url  = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
              Name = "ffmpeg-btbn.zip"
            },
            @{
              Url  = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
              Name = "ffmpeg-gyan.zip"
            }
          )

          $downloaded = $false
          foreach ($src in $sources) {
            $downloadPath = Join-Path $env:RUNNER_TEMP $src.Name
            Write-Host "Trying: $($src.Url)"
            try {
              Invoke-WebRequest -Uri $src.Url -OutFile $downloadPath -UseBasicParsing -TimeoutSec 120
              Write-Host "Downloaded successfully ($([math]::Round((Get-Item $downloadPath).Length / 1MB, 1)) MB)"
              $downloaded = $true
              break
            } catch {
              Write-Warning "Failed: $($_.Exception.Message)"
            }
          }

          if (-not $downloaded) {
            throw "All FFmpeg download sources failed."
          }

          Write-Host "Extracting to $extractPath"
          Expand-Archive -Path $downloadPath -DestinationPath $extractPath -Force

          # Find the bin directory inside the extracted archive
          $binDir = Get-ChildItem -Path $extractPath -Filter "ffmpeg.exe" -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1 | ForEach-Object { $_.DirectoryName }

          if (-not $binDir) {
            Get-ChildItem -Path $extractPath -Recurse | Select-Object -First 30 | ForEach-Object { Write-Host $_.FullName }
            throw "ffmpeg.exe not found after extraction"
          }

          # Verify ffprobe.exe is also present
          if (-not (Test-Path (Join-Path $binDir "ffprobe.exe"))) {
            throw "ffprobe.exe not found at $binDir"
          }

          Write-Host "FFmpeg binaries at: $binDir"
          "FFMPEG_BIN_DIR=$binDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Resolve release version
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build release artifacts
        timeout-minutes: 30
        run: .\scripts\Build-Release.ps1 -Version $env:RELEASE_VERSION -FfmpegBinDir $env:FFMPEG_BIN_DIR

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PodcastVideoEditor-release-${{ env.RELEASE_VERSION }}
          path: |
            PodcastVideoEditor/artifacts/release/packages/PodcastVideoEditor-Setup-v${{ env.RELEASE_VERSION }}.exe
            PodcastVideoEditor/artifacts/release/packages/PodcastVideoEditor-win-x64-v${{ env.RELEASE_VERSION }}.zip
            PodcastVideoEditor/artifacts/release/packages/SHA256SUMS.txt

      - name: Verify GitHub CLI
        run: gh --version

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $false
          $tag = $env:GITHUB_REF_NAME
          $repo = $env:GITHUB_REPOSITORY
          $version = $env:RELEASE_VERSION
          $assets = @(
            (Resolve-Path ".\artifacts\release\packages\PodcastVideoEditor-Setup-v$version.exe").Path,
            (Resolve-Path ".\artifacts\release\packages\PodcastVideoEditor-win-x64-v$version.zip").Path,
            (Resolve-Path ".\artifacts\release\packages\SHA256SUMS.txt").Path
          )

          & gh release view $tag --repo $repo 1>$null 2>$null
          if ($LASTEXITCODE -eq 0) {
            & gh release upload $tag $assets --repo $repo --clobber
            exit $LASTEXITCODE
          }

          & gh release create $tag $assets --repo $repo --title "Podcast Video Editor $tag" --generate-notes
