name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: pwsh
        working-directory: PodcastVideoEditor

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install packaging dependencies
        run: |
          choco install innosetup --yes --no-progress
          choco install ffmpeg --yes --no-progress

      - name: Resolve FFmpeg bundle directory
        run: |
          # Refresh PATH so choco-installed tools are visible
          $env:Path = [System.Environment]::GetEnvironmentVariable('Path', 'Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path', 'User')

          # Search common Chocolatey layouts and PATH
          $candidates = @(
            "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin",
            "C:\ProgramData\chocolatey\lib\ffmpeg\tools",
            "C:\ProgramData\chocolatey\bin"
          )

          $cmd = Get-Command ffmpeg.exe -ErrorAction SilentlyContinue
          if ($cmd) { $candidates += (Split-Path -Parent $cmd.Source) }

          # Also scan any nested bin dirs under the chocolatey ffmpeg lib
          $chocoFfmpegRoot = "C:\ProgramData\chocolatey\lib\ffmpeg\tools"
          if (Test-Path $chocoFfmpegRoot) {
            Get-ChildItem -Path $chocoFfmpegRoot -Filter "ffmpeg.exe" -Recurse -ErrorAction SilentlyContinue |
              ForEach-Object { $candidates += $_.DirectoryName }
          }

          $ffmpegBinDir = $null
          foreach ($dir in $candidates | Select-Object -Unique) {
            if ((Test-Path (Join-Path $dir "ffmpeg.exe")) -and (Test-Path (Join-Path $dir "ffprobe.exe"))) {
              $ffmpegBinDir = $dir
              break
            }
          }

          if (-not $ffmpegBinDir) {
            Write-Host "Searched candidates:"
            $candidates | ForEach-Object { Write-Host "  - $_" }
            throw "Could not find ffmpeg.exe + ffprobe.exe in any known location."
          }

          Write-Host "Found FFmpeg at: $ffmpegBinDir"
          "FFMPEG_BIN_DIR=$ffmpegBinDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Resolve release version
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build release artifacts
        timeout-minutes: 30
        run: .\scripts\Build-Release.ps1 -Version $env:RELEASE_VERSION -FfmpegBinDir $env:FFMPEG_BIN_DIR

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PodcastVideoEditor-release-${{ env.RELEASE_VERSION }}
          path: |
            PodcastVideoEditor/artifacts/release/packages/PodcastVideoEditor-Setup-v${{ env.RELEASE_VERSION }}.exe
            PodcastVideoEditor/artifacts/release/packages/PodcastVideoEditor-win-x64-v${{ env.RELEASE_VERSION }}.zip
            PodcastVideoEditor/artifacts/release/packages/SHA256SUMS.txt

      - name: Verify GitHub CLI
        run: gh --version

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $false
          $tag = $env:GITHUB_REF_NAME
          $repo = $env:GITHUB_REPOSITORY
          $version = $env:RELEASE_VERSION
          $assets = @(
            (Resolve-Path ".\artifacts\release\packages\PodcastVideoEditor-Setup-v$version.exe").Path,
            (Resolve-Path ".\artifacts\release\packages\PodcastVideoEditor-win-x64-v$version.zip").Path,
            (Resolve-Path ".\artifacts\release\packages\SHA256SUMS.txt").Path
          )

          & gh release view $tag --repo $repo 1>$null 2>$null
          if ($LASTEXITCODE -eq 0) {
            & gh release upload $tag $assets --repo $repo --clobber
            exit $LASTEXITCODE
          }

          & gh release create $tag $assets --repo $repo --title "Podcast Video Editor $tag" --generate-notes
