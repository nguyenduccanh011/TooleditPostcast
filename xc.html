<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Mirror Visualizer - Pro Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            /* Tạo độ tương phản cao cho màu neon */
            filter: contrast(1.3) brightness(1.2); 
        }

        /* Giao diện UI tối giản */
        #ui-container {
            position: absolute;
            z-index: 10;
            bottom: 40px;
            width: 100%;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .btn-glow {
            background: transparent;
            color: #0ff;
            border: 1px solid #0ff;
            padding: 10px 30px;
            font-size: 1.2rem;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn-glow:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        }

        input[type="file"] {
            display: none;
        }

        #song-name {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.1); /* Chữ chìm */
            z-index: 0;
            mix-blend-mode: overlay; /* Hòa trộn vào nền */
        }

        /* Ẩn UI khi nhạc chạy để sạch màn hình */
        body.playing #ui-container {
            opacity: 0;
            pointer-events: none;
        }
        body.playing:hover #ui-container {
            opacity: 1;
            pointer-events: auto;
        }

    </style>
</head>
<body>

    <div id="song-name">WAITING FOR AUDIO...</div>
    <canvas id="canvas"></canvas>

    <div id="ui-container">
        <label class="btn-glow">
            Load Audio File
            <input type="file" id="file-upload" accept="audio/*">
        </label>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fileUpload = document.getElementById('file-upload');
        const songNameLabel = document.getElementById('song-name');
        
        let audioContext, audioSource, analyser;
        
        // Cấu hình hiển thị
        const settings = {
            barWidth: 6,         // Độ rộng thanh sóng
            gap: 2,              // Khoảng cách giữa các thanh
            capHeight: 4,        // Độ cao của "nắp" (vạch rơi)
            capDropSpeed: 1.5,   // Tốc độ rơi của nắp
            barColorStart: '#00d2ff', // Màu Neon Xanh
            barColorEnd: '#928dab'    // Màu Tím nhạt
        };

        // Mảng lưu vị trí hiện tại của các "nắp" (caps)
        let caps = []; 

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        fileUpload.addEventListener('change', function() {
            const files = this.files;
            if(files.length > 0) {
                songNameLabel.innerText = files[0].name.replace(/\.[^/.]+$/, "");
                document.body.classList.add('playing');
                
                const reader = new FileReader();
                reader.onload = (e) => initAudio(e.target.result);
                reader.readAsArrayBuffer(files[0]);
            }
        });

        function initAudio(buffer) {
            if(audioContext) audioContext.close();
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            
            // FFT size vừa phải để đảm bảo độ mượt và chi tiết
            analyser.fftSize = 2048; 
            
            audioContext.decodeAudioData(buffer, (decoded) => {
                audioSource = audioContext.createBufferSource();
                audioSource.buffer = decoded;
                audioSource.connect(analyser);
                analyser.connect(audioContext.destination);
                audioSource.loop = true;
                audioSource.start(0);
                render();
            });
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            // Tính toán số lượng thanh có thể vẽ dựa trên chiều rộng màn hình
            // Ta chỉ vẽ 1 nửa màn hình, sau đó mirror lại
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Số lượng thanh vẽ cho một bên (trái hoặc phải)
            // Lấy khoảng 80 thanh cho đẹp, không quá dày
            const numBars = 80; 
            const totalBarWidth = settings.barWidth + settings.gap;
            
            // Khởi tạo mảng caps nếu chưa có
            if (caps.length !== numBars) {
                caps = new Array(numBars).fill(0);
            }

            // VẼ ĐƯỜNG CHÂN TRỜI (HORIZON LINE)
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            ctx.lineTo(canvas.width, centerY);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // VÒNG LẶP VẼ
            for (let i = 0; i < numBars; i++) {
                // Lấy dữ liệu tần số. 
                // Ta nhân với một hệ số (step) để trải đều dải tần số ra 80 thanh
                // Bỏ qua các tần số quá cao (thường im lặng) bằng cách nhân 0.6
                let index = Math.floor(i * (bufferLength / numBars) * 0.6); 
                let value = dataArray[index];

                // Chiều cao thanh (scale cho vừa màn hình)
                let barHeight = (value / 255) * (canvas.height / 2.5);
                
                // --- Xử lý hiệu ứng rơi của nắp (Falling Caps) ---
                if (barHeight > caps[i]) {
                    caps[i] = barHeight; // Đẩy nắp lên ngay lập tức
                } else {
                    caps[i] = Math.max(0, caps[i] - settings.capDropSpeed); // Rơi từ từ
                }

                // --- Tọa độ vẽ ---
                // Tính khoảng cách từ tâm ra
                let xOffset = i * totalBarWidth; 
                
                // Màu sắc động (Gradient theo độ cao)
                // Màu thay đổi theo thời gian thực (Hue rotate)
                let hue = (i * 2) + (Date.now() * 0.05);
                let color = `hsl(${hue}, 100%, 50%)`;
                
                ctx.shadowBlur = 10;
                ctx.shadowColor = color;
                ctx.fillStyle = color;

                // --- VẼ 4 PHẦN (QUAD SYMMETRY) ---

                // 1. Phía Bên Phải (Từ tâm ra phải)
                drawBarPair(centerX + xOffset, centerY, settings.barWidth, barHeight, caps[i], color);

                // 2. Phía Bên Trái (Từ tâm ra trái)
                // Trừ đi totalBarWidth để không bị chồng lên thanh đầu tiên ở tâm
                if (i > 0) { 
                    drawBarPair(centerX - xOffset, centerY, settings.barWidth, barHeight, caps[i], color);
                }
            }

            requestAnimationFrame(render);
        }

        /**
         * Hàm vẽ một cặp thanh đối xứng trên dưới
         * @param x: Tọa độ X
         * @param cy: Tọa độ Y trung tâm (Center Y)
         * @param w: Chiều rộng
         * @param h: Chiều cao
         * @param capH: Chiều cao của nắp đang rơi
         * @param color: Màu sắc
         */
        function drawBarPair(x, cy, w, h, capH, color) {
            // Thanh trên (Top Bar) - Vẽ từ đường giữa lên trên
            // Lưu ý: Canvas Y giảm dần khi đi lên
            // Ta dùng Linear Gradient cho thanh để tạo độ sâu
            let gradTop = ctx.createLinearGradient(0, cy, 0, cy - h);
            gradTop.addColorStop(0, 'rgba(255, 255, 255, 0.1)'); // Gần tâm thì mờ
            gradTop.addColorStop(1, color); // Đỉnh thì rực rỡ

            ctx.fillStyle = gradTop;
            
            // Vẽ thanh trên
            // roundRect là API mới, nếu trình duyệt cũ không hỗ trợ thì dùng fillRect
            if(ctx.roundRect) {
                ctx.beginPath();
                ctx.roundRect(x, cy - h - 1, w, h, [5, 5, 0, 0]); // Bo tròn đầu trên
                ctx.fill();
            } else {
                ctx.fillRect(x, cy - h - 1, w, h);
            }

            // Vẽ Nắp trên (Cap Top)
            ctx.fillStyle = '#fff'; // Nắp màu trắng
            ctx.fillRect(x, cy - capH - settings.capHeight - 4, w, settings.capHeight);


            // Thanh dưới (Bottom Bar) - Vẽ từ đường giữa xuống dưới (Reflection)
            // Giảm opacity để tạo hiệu ứng phản chiếu dưới mặt nước
            let gradBot = ctx.createLinearGradient(0, cy, 0, cy + h);
            gradBot.addColorStop(0, 'rgba(255, 255, 255, 0.1)');
            gradBot.addColorStop(1, color);

            ctx.save();
            ctx.globalAlpha = 0.4; // Làm mờ phần phản chiếu
            ctx.fillStyle = gradBot;
            
            if(ctx.roundRect) {
                ctx.beginPath();
                ctx.roundRect(x, cy + 1, w, h, [0, 0, 5, 5]); // Bo tròn đầu dưới
                ctx.fill();
            } else {
                ctx.fillRect(x, cy + 1, w, h);
            }

            // Vẽ Nắp dưới (Cap Bottom - Reflection)
            ctx.fillStyle = '#fff';
            ctx.fillRect(x, cy + capH + 4, w, settings.capHeight);
            
            ctx.restore();
        }
    </script>
</body>
</html>
